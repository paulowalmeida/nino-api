type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Auth Module
meta:
  id: wrk_auth_module
  created: 1776000000000
  modified: 1776000000000
  description: "Auth management"
collection:
  - name: auth
    meta:
      id: fld_auth_module
      created: 1776000000000
      modified: 1776000000000
      sortKey: -1
      description: "Auth endpoints"
    children:
      - url: "{{BASE_URL}}/auth/register"
        name: register
        meta:
          id: req_auth_register
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Roles: public"
          sortKey: -1
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"name\": \"Paulo\",\n  \"email\": \"paulo@nino.com\",\n  \"password\": \"senha123\",\n  \"globalRole\": \"ADMIN\"\n}"
        headers:
          - id: pair_register_h1
            name: Content-Type
            value: application/json
        authentication: {}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/login"
        name: login
        meta:
          id: req_auth_login
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Roles: public"
          sortKey: -2
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"email\": \"paulo@nino.com\",\n  \"password\": \"senha123\"\n}"
        headers:
          - id: pair_login_h1
            name: Content-Type
            value: application/json
        authentication: {}
        scripts:
          afterResponse: |
            const data = await insomnia.response.json();
            insomnia.environment.set("ACCESS_TOKEN", data.tokens.accessToken);
            insomnia.environment.set("REFRESH_TOKEN", data.tokens.refreshToken);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/me"
        name: me
        meta:
          id: req_auth_me
          created: 1776000000001
          modified: 1776000000001
          isPrivate: false
          description: "Roles: authenticated"
          sortKey: -3
        method: GET
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/refresh"
        name: refresh
        meta:
          id: req_auth_refresh
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Roles: public"
          sortKey: -4
        method: POST
        headers: []
        authentication:
          type: bearer
          token: "{{REFRESH_TOKEN}}"
          prefix: Bearer
        scripts:
          afterResponse: |
            const data = await insomnia.response.json();
            insomnia.environment.set("ACCESS_TOKEN", data.tokens.accessToken);
            insomnia.environment.set("REFRESH_TOKEN", data.tokens.refreshToken);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/logout"
        name: logout
        meta:
          id: req_auth_logout
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Roles: public"
          sortKey: -5
        method: POST
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

