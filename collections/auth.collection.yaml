type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Auth Module (4 endpoints)
meta:
  id: wrk_auth_module
  created: 1772544141333
  modified: 1776000000000
  description: "Authentication — login, logout, refresh token, change password"
collection:
  - name: auth
    meta:
      id: fld_auth_module
      created: 1772545962012
      modified: 1776000000000
      sortKey: -1772545962012
      description: "Authentication endpoints"
    children:
      - url: "{{BASE_URL}}/auth/login"
        name: login
        meta:
          id: req_auth_login
          created: 1773403915109
          modified: 1776000000000
          isPrivate: false
          description: "Authenticate and get tokens"
          sortKey: -1
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "user@example.com",
              "password": "password123"
            }
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: none
        scripts:
          afterResponse: >
            const json = await insomnia.response.json();
            if (json && json.tokens) {
              if(json.tokens.accessToken) {
                insomnia.environment.set('ACCESS_TOKEN', json.tokens.accessToken);
              }
              if(json.tokens.refreshToken) {
                insomnia.environment.set('REFRESH_TOKEN', json.tokens.refreshToken);
              }
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/logout"
        name: logout
        meta:
          id: req_auth_logout
          created: 1774437148741
          modified: 1776000000000
          isPrivate: false
          description: "Logout and invalidate refresh token"
          sortKey: -2
        method: POST
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/refresh-token"
        name: refresh-token
        meta:
          id: req_auth_refresh
          created: 1774842137452
          modified: 1776000000000
          isPrivate: false
          description: "Renew access token using refresh token"
          sortKey: -3
        method: POST
        headers: []
        authentication:
          type: bearer
          token: "{{REFRESH_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/change-password"
        name: change-password
        meta:
          id: req_auth_change_pwd
          created: 1775436388277
          modified: 1776000000000
          isPrivate: false
          description: "Change account password"
          sortKey: -4
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "oldPassword": "password123",
              "newPassword": "newpassword456"
            }
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
