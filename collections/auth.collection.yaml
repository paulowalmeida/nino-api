          text: |-
            {
            	"email": "paulo.weskley3@ninomia.com",
              "password": "senha123"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.3.1
            description: ""
            disabled: false
        authentication:
          type: none
        scripts:
          afterResponse: >
            const json = await insomnia.response.json();

            if (json && json.tokens) {
            	if(json.tokens.accessToken) {
            		insomnia.environment.set('ACCESS_TOKEN', json.tokens.accessToken);	
            	}
            	
            	if(json.tokens.refreshToken) {
            		insomnia.environment.set('REFRESH_TOKEN', json.tokens.refreshToken);	
            	}
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
