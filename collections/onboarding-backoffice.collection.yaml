        TENANT_STATUS_ID: ""
        PAYMENT_METHOD_ID: ""
        USER_ID: ""
        COMPANY_ID: ""
        TENANT_ID: ""
        PLAN_ID: ""
        SUBSCRIPTION_STATUS_ID: ""
        SUBSCRIPTION_ID: ""
