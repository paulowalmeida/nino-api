type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Onboarding — Consumer (Guest)
meta:
  id: wrk_onboarding_consumer_guest
  created: 1776000000000
  modified: 1776000000000
  description: "Pedido sem cadastro: nome + telefone + endereço + itens. Status PENDING resolvido automaticamente."
collection:
  - name: consumer-guest
    meta:
      id: fld_onboarding_consumer_guest
      created: 1776000000000
      modified: 1776000000000
      sortKey: -1
      description: "Execute os requests em ordem. ATENÇÃO: steps 1 e 2 ainda exigem JWT — tornar público é melhoria futura."
    children:
      - url: "{{BASE_URL}}/tenants/slug/{{TENANT_SLUG}}"
        name: 1-find-tenant-by-slug
        meta:
          id: req_ocg_find_tenant
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Requer JWT hoje (melhoria futura: público). Copie o id para TENANT_ID"
          sortKey: -1
        method: GET
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/tenants/{{TENANT_ID}}/products"
        name: 2-browse-products
        meta:
          id: req_ocg_browse_products
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Requer JWT hoje (melhoria futura: público). Copie o id do produto para PRODUCT_ID"
          sortKey: -2
        method: GET
        parameters:
          - id: pair_ocg_p1
            name: isActive
            value: "true"
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders/guest"
        name: 3-place-guest-order
        meta:
          id: req_ocg_place_order
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Público — sem JWT. Status PENDING resolvido automaticamente pelo servidor"
          sortKey: -3
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"tenantId\": \"{{TENANT_ID}}\",\n  \"isDelivery\": true,\n  \"deliveryFee\": 5.00,\n  \"guestName\": \"João Silva\",\n  \"guestPhone\": \"91999990000\",\n  \"guestZipCode\": \"66000-000\",\n  \"guestStreet\": \"Av. Nazaré\",\n  \"guestNumber\": \"100\",\n  \"guestNeighborhood\": \"Nazaré\",\n  \"guestCity\": \"Belém\",\n  \"guestState\": \"PA\",\n  \"notes\": \"Sem cebola\",\n  \"items\": [\n    {\n      \"productId\": \"{{PRODUCT_ID}}\",\n      \"quantity\": 2,\n      \"unitPrice\": 25.90\n    }\n  ]\n}"
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

cookieJar:
  name: Default Jar
  meta:
    id: jar_onboarding_consumer_guest
    created: 1776000000000
    modified: 1776000000000

environments:
  name: Base Environment
  meta:
    id: env_onboarding_consumer_guest
    created: 1776000000000
    modified: 1776000000000
    isPrivate: false
  subEnvironments:
    - name: nino
      meta:
        id: env_onboarding_consumer_guest_nino
        created: 1776000000000
        modified: 1776000000000
        isPrivate: false
        sortKey: 1776000000000
      data:
        BASE_URL: http://localhost:3000
        ACCESS_TOKEN: ""
        TENANT_SLUG: "meu-restaurante"
        TENANT_ID: ""
        PRODUCT_ID: ""
