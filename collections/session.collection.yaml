type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Session Module
meta:
  id: wrk_session_module
  created: 1776000000000
  modified: 1776000000000
  description: "Session management"
collection:
  - name: session
    meta:
      id: fld_session_module
      created: 1776000000000
      modified: 1776000000000
      sortKey: -1
    children:
      - url: "{{BASE_URL}}/sessions/list-by-user-id/{{USER_ID}}"
        name: list-by-user
        meta:
          id: req_session_list
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          sortKey: -1
        method: GET
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global

      - url: "{{BASE_URL}}/sessions/{{SESSION_ID}}"
        name: by-id
        meta:
          id: req_session_get
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          sortKey: -2
        method: GET
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global

      - url: "{{BASE_URL}}/sessions"
        name: create
        meta:
          id: req_session_create
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          sortKey: -3
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"userId\": \"{{USER_ID}}\",\n  \"ip\": \"127.0.0.1\",\n  \"userAgent\": \"Insomnia\"\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication: {}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global

      - url: "{{BASE_URL}}/sessions/{{SESSION_ID}}"
        name: update
        meta:
          id: req_session_update
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          sortKey: -4
        method: PATCH
        body:
          mimeType: application/json
          text: "{\n  \"isActive\": false\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global

      - url: "{{BASE_URL}}/sessions/{{SESSION_ID}}"
        name: delete
        meta:
          id: req_session_delete
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          sortKey: -5
        method: DELETE
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global

environments:
  name: Base Environment
  meta:
