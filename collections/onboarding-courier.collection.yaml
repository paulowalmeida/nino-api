type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Onboarding — Courier (Entregador)
meta:
  id: wrk_onboarding_courier
  created: 1776000000000
  modified: 1776000000000
  description: "Caminho feliz do entregador: login → vínculos → pedidos → entrega"
collection:
  - name: courier
    meta:
      id: fld_onboarding_courier
      created: 1776000000000
      modified: 1776000000000
      sortKey: -1
      description: "Execute os requests em ordem. O courier é um User com role COURIER — sem perfil separado."
    children:
      - url: "{{BASE_URL}}/auth/sessions"
        name: 1-login
        meta:
          id: req_ocr_login
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Login com role COURIER — copie o accessToken para ACCESS_TOKEN e o userId para COURIER_ID"
          sortKey: -1
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"email\": \"entregador@example.com\",\n  \"password\": \"Senha@123\"\n}"
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/courier-tenants/courier/{{COURIER_ID}}"
        name: 2-my-tenants
        meta:
          id: req_ocr_my_tenants
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Lista os tenants vinculados a este entregador — copie o tenantId para TENANT_ID"
          sortKey: -2
        method: GET
        parameters:
          - id: pair_ocr_p1
            name: page
            value: "1"
          - id: pair_ocr_p2
            name: size
            value: "10"
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders"
        name: 3-list-orders
        meta:
          id: req_ocr_list_orders
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Lista pedidos do tenant — copie o id de um pedido para ORDER_ID"
          sortKey: -3
        method: GET
        parameters:
          - id: pair_ocr_p3
            name: tenantId
            value: "{{TENANT_ID}}"
          - id: pair_ocr_p4
            name: page
            value: "1"
          - id: pair_ocr_p5
            name: size
            value: "10"
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders/{{ORDER_ID}}/status"
        name: 4-mark-out-for-delivery
        meta:
          id: req_ocr_out_for_delivery
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Marca pedido como saiu para entrega — Roles: OWNER, MANAGER, STAFF"
          sortKey: -4
        method: PATCH
        body:
          mimeType: application/json
          text: "{\n  \"statusId\": \"{{STATUS_OUT_FOR_DELIVERY_ID}}\"\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders/{{ORDER_ID}}/status"
        name: 5-mark-delivered
        meta:
          id: req_ocr_delivered
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Confirma entrega realizada"
          sortKey: -5
        method: PATCH
        body:
          mimeType: application/json
          text: "{\n  \"statusId\": \"{{STATUS_DELIVERED_ID}}\"\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

cookieJar:
  name: Default Jar
  meta:
    id: jar_onboarding_courier
    created: 1776000000000
    modified: 1776000000000

environments:
  name: Base Environment
  meta:
    id: env_onboarding_courier
    created: 1776000000000
    modified: 1776000000000
    isPrivate: false
  subEnvironments:
    - name: nino
      meta:
        id: env_onboarding_courier_nino
        created: 1776000000000
        modified: 1776000000000
        isPrivate: false
        sortKey: 1776000000000
      data:
        BASE_URL: http://localhost:3000
        ACCESS_TOKEN: ""
        COURIER_ID: ""
        TENANT_ID: ""
        ORDER_ID: ""
        STATUS_OUT_FOR_DELIVERY_ID: ""
        STATUS_DELIVERED_ID: ""
