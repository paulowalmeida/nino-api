          isPrivate: false
          description: "Roles: CUSTOMER, OWNER, MANAGER, STAFF"
          sortKey: -3
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"tenantId\": \"{{TENANT_ID}}\",\n  \"statusId\": \"{{ORDER_STATUS_ID}}\",\n  \"customerId\": \"{{CUSTOMER_ID}}\",\n  \"isDelivery\": true,\n  \"deliveryFee\": 5.00,\n  \"deliveryAddressId\": \"{{CUSTOMER_ADDRESS_ID}}\",\n  \"notes\": \"Sem cebola\",\n  \"items\": [\n    {\n      \"productId\": \"{{PRODUCT_ID}}\",\n      \"quantity\": 2,\n      \"unitPrice\": 25.90\n    }\n  ]\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

