          sortKey: -4
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"tenantId\": \"{{TENANT_ID}}\",\n  \"statusId\": \"{{ORDER_STATUS_ID}}\",\n  \"isDelivery\": true,\n  \"deliveryFee\": 5.00,\n  \"guestName\": \"João Silva\",\n  \"guestPhone\": \"+559112345678\",\n  \"guestEmail\": \"joao@email.com\",\n  \"guestZipCode\": \"66000-000\",\n  \"guestStreet\": \"Av. Nazaré\",\n  \"guestNumber\": \"100\",\n  \"guestNeighborhood\": \"Nazaré\",\n  \"guestCity\": \"Belém\",\n  \"guestState\": \"PA\",\n  \"items\": [\n    {\n      \"productId\": \"{{PRODUCT_ID}}\",\n      \"quantity\": 1,\n      \"unitPrice\": 25.90\n    }\n  ]\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders/{{ORDER_ID}}/status"
