          id: req_order_update_status
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: "Roles: OWNER, MANAGER, STAFF"
          sortKey: -5
        method: PATCH
        body:
          mimeType: application/json
          text: "{\n  \"statusId\": \"{{ORDER_STATUS_ID}}\"\n}"
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

