          sortKey: -1
        method: GET
        parameters:
          - id: pair_order_p1
            name: page
            value: "1"
          - id: pair_order_p2
            name: size
            value: "10"
          - id: pair_order_p3
            name: tenantId
            value: "{{TENANT_ID}}"
        headers: []
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/orders/{{ORDER_ID}}"
