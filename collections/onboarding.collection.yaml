type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Onboarding
meta:
  id: wrk_onboarding
  created: 1776000000000
  modified: 1776000000000
  description: "Happy path de onboarding"
collection:
  - name: "1. admin / support"
    meta:
      id: fld_onboarding_admin
      created: 1776000000000
      modified: 1776000000000
      sortKey: -1
      description: "Usuários sem empresa (ADMIN ou SUPPORT)"
    children:
      - url: "{{BASE_URL}}/auth/register"
        name: "1. register"
        meta:
          id: req_onboarding_admin_register
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: ""
          sortKey: -1
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"name\": \"Paulo Admin\",\n  \"email\": \"admin@nino.com\",\n  \"password\": \"senha123\",\n  \"role\": \"ADMIN\"\n}"
        headers:
          - id: pair_onboarding_admin_register_h1
            name: Content-Type
            value: application/json
        authentication: {}
        scripts:
          afterResponse: |
            const data = await insomnia.response.json();
            insomnia.environment.set("USER_ID", data.id);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

      - url: "{{BASE_URL}}/auth/login"
        name: "2. login"
        meta:
          id: req_onboarding_admin_login
          created: 1776000000000
          modified: 1776000000000
          isPrivate: false
          description: ""
          sortKey: -2
        method: POST
        body:
          mimeType: application/json
          text: "{\n  \"email\": \"admin@nino.com\",\n  \"password\": \"senha123\"\n}"
        headers:
          - id: pair_onboarding_admin_login_h1
            name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{ACCESS_TOKEN}}"
          prefix: Bearer
        scripts:
          afterResponse: |
            const data = await insomnia.response.json();
            insomnia.environment.set("ACCESS_TOKEN", data.tokens.accessToken);
            insomnia.environment.set("REFRESH_TOKEN", data.tokens.refreshToken);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

