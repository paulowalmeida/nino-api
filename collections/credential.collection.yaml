    children:
      - url: "{{BASE_URL}}/auth/login"
        name: login
        meta:
          id: req_142feb2a2cd5455cacdd88bab5778472
          created: 1773403915109
          modified: 1776049695597
          isPrivate: false
          description: Authenticate and get tokens
          sortKey: -104
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "paulo.weskley@ninomia.com",
              "password": "Puruca2010*"
            }
        headers:
          - name: Content-Type
            value: application/json
        authentication:
          type: none
        scripts:
          afterResponse: >
            const json = await insomnia.response.json(); if (json &&
            json.tokens) {
              if(json.tokens.accessToken) {
                insomnia.environment.set('ACCESS_TOKEN', json.tokens.accessToken);
              }
              if(json.tokens.refreshToken) {
                insomnia.environment.set('REFRESH_TOKEN', json.tokens.refreshToken);
              }
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{BASE_URL}}/auth/logout"
        name: logout
        meta:
          id: req_beef49c62f8d4dd19756fef3d9771e7f
          created: 1774437148741
          modified: 1776043453765
          isPrivate: false
          description: Logout and invalidate refresh token
          sortKey: -54
