name: Jira Domain Agent
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  add-ubiquitous-comment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira Key
        id: extract_key
        run: |
          # Extrai NAPI-XX do título do PR
          KEY=$(echo "${{ github.event.pull_request.title }}" | grep -oE 'NAPI-[0-9]+' | head -1)
          echo "jira_key=$KEY" >> $GITHUB_OUTPUT

      - name: Generate AI Comment
        if: steps.extract_key.outputs.jira_key != ''
        id: ai_agent
        run: |
          # Aqui chamarias um script Node/Python que:
          # 1. Lê o Diff do PR
          # 2. Envia para a API da IA com o prompt de Linguagem Ubíqua
          # 3. Retorna o texto formatado
          echo "comment=🗣️ **Domínio:** Empresa (Company) é a Matriz pagante..." >> $GITHUB_OUTPUT

      - name: Post to Jira
        if: steps.ai_agent.outputs.comment != ''
        run: |
          curl --request POST \
            --url "https://ninomia.atlassian.net/rest/api/2/issue/${{ steps.extract_key.outputs.jira_key }}/comment" \
            --user "${{ weskleyalmeida.si@gmail.com }}:${{ ATATT3xFfGF0NUncMRlv6RLUdXFQ8Pfp2NSgcZLlT8LC_Irg7o4E-WeBL0491Jn-ALFrKzma_R2Z3CXVAto3gEBHvkNwi3gQUlu9a0Cc71gGXIvRkS7u6vavO2qXmd6Fbdm01Atf5qd4yp_iCW2P4BWKV6rgp_EC9ZMjRZM7ariMecIq9mmUR94=8EE379E2 }}" \
            --header 'Accept: application/json' \
            --header 'Content-Type: application/json' \
            --data '{"body": "${{ steps.ai_agent.outputs.comment }}"}'